<!DOCTYPE html>
<html lang="de">
<head>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, #edf4fb 100%);
      color: #0f172a;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;

    }

      font-weight: 700;
      color: #16a34a;
    }

    .actions {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 22px;
      border-radius: 14px;
      font-weight: 700;
      text-decoration: none;
      width: 100%;
      max-width: 320px;
    }

    .btn-primary {
      background: #16a34a;
      color: #ffffff;
    }

    .btn-secondary {
      background: #1d4ed8;
      color: #ffffff;
    }

    .btn-light {
      background: #eef5ff;
      color: #1d4ed8;
    }

</head>
