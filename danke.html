<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vielen Dank | Weinrich Objektservice</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, #edf4fb 100%);
      color: #0f172a;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      max-width: 680px;
      width: 100%;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(15,23,42,0.10);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: 42px;
    }

    p {
      color: #475569;
      font-size: 18px;
      line-height: 1.6;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 0 20px;
      border-radius: 14px;
      font-weight: 700;
      text-decoration: none;
      background: #16a34a;
      color: #ffffff;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Vielen Dank!</h1>
      <p>
        Ihre Anfrage wurde erfolgreich übermittelt.<br>
        Ich werde mich schnellstmöglich bei Ihnen melden.
      </p>
      <a href="index.html" class="btn">Zur Startseite</a>
    </div>
  </div>
</body>
</html>
